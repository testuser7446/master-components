<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footer — Option 2 | Emirates NBD</title>
  <script src="../../assets/js/tailwind.cdn.js"></script>
  <link rel="stylesheet" href="../../assets/css/fonts.css" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-fade { opacity: 0; transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1); }
    .reveal-fade.visible { opacity: 1; }
  </style>
</head>
<body class="bg-[#F4F7FB] pt-10">

  <!-- Back nav -->
  <div id="back-nav-bar" class="fixed top-0 left-0 right-0 z-50 flex items-center h-10 px-4 bg-white/90 backdrop-blur-sm border-b border-gray-100">
    <a href="../../index.html" class="text-[#072447]/60 hover:text-[#072447] text-xs flex items-center gap-2 transition-colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-gray-300 text-xs ml-3">/ Footer — Option 2</span>
  </div>

  <!-- Page content placeholder -->
  <div class="px-8 py-8 text-center text-sm text-[#3A4B5C]/40">Page content above footer</div>

  <section class="w-full px-4 md:px-6 pb-6">
    <footer class="w-full bg-[#0f2340] rounded-2xl mx-auto px-12 md:px-20 py-14 md:py-16">
      <div class="max-w-[1400px] mx-auto">

        <!-- Heading -->
        <h2 class="reveal text-[48px] lg:text-[72px] font-bold text-white leading-tight tracking-tight mb-12 max-w-2xl">
          Let's move forward, together.
        </h2>

        <!-- Input + CTA -->
        <div class="reveal flex items-stretch gap-3 mb-16 max-w-2xl" style="transition-delay:0.1s">
          <input
            type="text"
            placeholder="How was your experience?"
            class="flex-1 px-5 py-3.5 rounded-lg bg-transparent border border-white/20 text-white placeholder-white/40 text-[14px] focus:outline-none focus:border-white/50 transition-colors duration-200"
          />
          <button class="px-6 py-3.5 rounded-lg bg-white/15 hover:bg-white/25 text-white text-[14px] font-medium transition-colors duration-200 whitespace-nowrap">
            Talk to an advisor
          </button>
        </div>

        <!-- Bottom row -->
        <div class="reveal-fade flex flex-col md:flex-row items-start md:items-center justify-between gap-6" style="transition-delay:0.2s">

          <!-- Left: Website settings -->
          <div class="flex items-center gap-4 text-[13px] text-white/60">
            <span class="font-medium text-white/70">Website Settings</span>
            <span class="flex items-center gap-1.5">
              <span>🇦🇪</span>
              <span>Arabic :</span>
              <span class="text-white/80 font-medium">عربي</span>
            </span>
          </div>

          <!-- Right: Social -->
          <div class="flex items-center gap-4">
            <span class="text-[13px] text-white/60">Emirates NBD on Social</span>
            <div class="flex items-center gap-3">
              <!-- Facebook -->
              <a href="#" aria-label="Facebook" class="text-white/60 hover:text-white transition-colors duration-200">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                  <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                </svg>
              </a>
              <!-- X (Twitter) -->
              <a href="#" aria-label="X" class="text-white/60 hover:text-white transition-colors duration-200">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
              </a>
              <!-- YouTube -->
              <a href="#" aria-label="YouTube" class="text-white/60 hover:text-white transition-colors duration-200">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                  <path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 001.46 6.42 29 29 0 001 12a29 29 0 00.46 5.58 2.78 2.78 0 001.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.96A29 29 0 0023 12a29 29 0 00-.46-5.58zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/>
                </svg>
              </a>
              <!-- Instagram -->
              <a href="#" aria-label="Instagram" class="text-white/60 hover:text-white transition-colors duration-200">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4">
                  <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                  <circle cx="12" cy="12" r="4"/>
                  <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
              </a>
              <!-- LinkedIn -->
              <a href="#" aria-label="LinkedIn" class="text-white/60 hover:text-white transition-colors duration-200">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
                  <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
                  <circle cx="4" cy="4" r="2"/>
                </svg>
              </a>
            </div>
          </div>

        </div>
      </div>
    </footer>
  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal, .reveal-fade').forEach(el => observer.observe(el));

    // Trigger immediately if already in view
    setTimeout(() => {
      document.querySelectorAll('.reveal, .reveal-fade').forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight) el.classList.add('visible');
      });
    }, 100);
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrics — Type 2 | Emirates NBD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .reveal { opacity:0; transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); transform: translateY(24px); }
    .reveal.visible { opacity:1; transform:translateY(0); }
  </style>
</head>
<body class="bg-white pt-10">
  <div class="fixed top-0 left-0 right-0 z-50 flex items-center h-10 px-4 bg-white/90 backdrop-blur-sm border-b border-gray-100">
    <a href="../../index.html" class="text-[#072447]/60 hover:text-[#072447] text-xs flex items-center gap-2 transition-colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-gray-300 text-xs ml-3">/ Metrics — Type 2</span>
  </div>

  <section class="bg-white w-full px-6 md:px-12 py-16">
    <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row items-center justify-between gap-12 w-full">

      <!-- Large hero number -->
      <div class="reveal flex items-center gap-5 shrink-0 justify-center md:justify-start w-full md:w-auto">
        <span class="text-[96px] lg:text-[120px] font-bold leading-none text-[#072447] tracking-tight">
          <span class="counter" data-end="50">0</span>
        </span>
        <span class="text-[22px] lg:text-[28px] font-normal leading-[150%] text-[#072447]">
          Years of<br />impact
        </span>
      </div>

      <div class="hidden md:block w-px self-stretch bg-[#E5E7EB]"></div>

      <!-- Supporting stats -->
      <div class="flex flex-col md:flex-row items-center md:justify-around gap-6 md:gap-16 flex-1 w-full">
        <div class="reveal flex flex-col gap-2 items-center md:items-start text-center md:text-left" style="transition-delay:0.12s">
          <div class="text-[72px] font-light leading-none text-[#072447] tracking-tight">
            <span class="counter" data-end="200">0</span>
          </div>
          <p class="text-[15px] lg:text-[18px] font-normal text-[#6C7A89]">Wealth Advisors</p>
        </div>
        <div class="w-12 h-px md:w-px md:h-12 bg-[#E5E7EB] shrink-0"></div>
        <div class="reveal flex flex-col gap-2 items-center md:items-start text-center md:text-left" style="transition-delay:0.24s">
          <div class="text-[72px] font-light leading-none text-[#072447] tracking-tight">
            <span class="counter" data-end="931">0</span>Bn
          </div>
          <p class="text-[15px] lg:text-[18px] font-normal text-[#6C7A89]">Total Assets</p>
        </div>
        <div class="w-12 h-px md:w-px md:h-12 bg-[#E5E7EB] shrink-0"></div>
        <div class="reveal flex flex-col gap-2 items-center md:items-start text-center md:text-left" style="transition-delay:0.36s">
          <div class="text-[72px] font-light leading-none text-[#072447] tracking-tight">
            <span class="counter" data-end="13">0</span>
          </div>
          <p class="text-[15px] lg:text-[18px] font-normal text-[#6C7A89]">Countries Operated</p>
        </div>
      </div>
    </div>
  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          e.target.querySelectorAll('.counter').forEach(startCount);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    function startCount(el) {
      if (el._started) return; el._started = true;
      const end = parseFloat(el.dataset.end);
      const dur = 2200;
      const start = performance.now();
      function tick(now) {
        const p = Math.min((now-start)/dur, 1);
        const ease = 1 - Math.pow(1-p, 3);
        el.textContent = Math.round(end*ease);
        if (p<1) requestAnimationFrame(tick);
        else el.textContent = end;
      }
      requestAnimationFrame(tick);
    }

    setTimeout(() => {
      document.querySelectorAll('.reveal').forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight) {
          el.classList.add('visible');
          el.querySelectorAll('.counter').forEach(startCount);
        }
      });
    }, 200);
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>

    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── Scroll-reveal ───────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                  transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.from-y    { transform: translateY(28px); }
    .reveal.from-y-sm { transform: translateY(16px); }
    .reveal.visible   { opacity: 1 !important; transform: none !important; }
    .delay-1 { transition-delay: 0.08s; }
    .delay-2 { transition-delay: 0.20s; }

    /* ── Marquee animation ───────────────────────────────────────────── */
    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .marquee-strip {
      display: flex;
      width: max-content;
      animation: marquee-scroll 80s linear infinite;
    }

    /* Pause on hover of the outer wrapper */
    .marquee-outer:hover .marquee-strip {
      animation-play-state: paused;
    }

    /* ── Edge fade mask ──────────────────────────────────────────────── */
    .marquee-outer {
      -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }

    /* ── Logo images ─────────────────────────────────────────────────── */
    .logo-img {
      height: 32px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      filter: grayscale(100%);
      opacity: 0.6;
      transition: filter 0.3s ease, opacity 0.3s ease;
      flex-shrink: 0;
    }

    /* Allow pointer events on the strip wrapper for hover to work on individual logos */
    .logo-item {
      display: flex;
      align-items: center;
      pointer-events: auto;
    }
    .logo-item:hover .logo-img {
      filter: grayscale(0%);
      opacity: 1;
    }

    @media (min-width: 768px) {
      .logo-img { height: 40px; }
    }
  </style>
</head>

  <script>
    // ── Scroll reveal ─────────────────────────────────────────────────
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

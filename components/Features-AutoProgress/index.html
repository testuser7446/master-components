<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Features — Auto-Progress Tabs | Emirates NBD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes progress { from{width:0} to{width:100%} }
    .progress-bar { animation: progress 4s linear forwards; }
    .feature-img { transition: opacity 0.4s ease, transform 0.4s ease; }
    .feature-img.fade { opacity:0; transform:translateY(16px); }
    @keyframes cardFadeIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes cardFadeInPrev { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    .card-enter { animation: cardFadeIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    .card-enter-prev { animation: cardFadeInPrev 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
  </style>
</head>
<body class="bg-white min-h-screen pt-10">
  <div class="fixed top-0 left-0 right-0 z-50 flex items-center h-10 px-4 bg-white/90 backdrop-blur-sm border-b border-gray-100">
    <a href="../../index.html" class="text-[#072447]/60 hover:text-[#072447] text-xs flex items-center gap-2 transition-colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-gray-300 text-xs ml-3">/ Features — Auto-Progress Tabs</span>
  </div>

  <section class="bg-white w-full px-6 md:px-[48px] lg:px-[120px] py-4 md:py-6">
    <div class="max-w-[1400px] mx-auto">

      <!-- Header -->
      <div class="text-center mb-12 md:mb-16">
        <span class="text-[#2765FF] font-normal text-[11px] lg:text-[13px] uppercase tracking-wider leading-[150%]">Corporate Banking Redefined.</span>
        <h2 class="text-[24px] lg:text-[36px] font-normal text-[#072447] mt-4">Smart Banking for Every Need</h2>
      </div>

      <!-- 2-col grid -->
      <div class="grid lg:grid-cols-2 gap-8 lg:gap-16 items-stretch">

        <!-- Left -->
        <div class="order-2 lg:order-1">

          <!-- Mobile: single card + counter -->
          <div class="lg:hidden">
            <div id="mobile-card" class="w-full"></div>

            <!-- Counter + arrows -->
            <div class="flex items-center justify-center gap-5 mt-4">
              <button onclick="scrollPrev()"
                class="w-11 h-11 rounded-full border border-gray-300 text-gray-400 bg-transparent flex items-center justify-center hover:bg-gray-100 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
              </button>

              <span id="mob-counter" class="text-sm font-semibold text-[#072447] tabular-nums min-w-[36px] text-center"></span>

              <button onclick="scrollNext()"
                class="w-11 h-11 rounded-full border border-gray-300 text-gray-400 bg-transparent flex items-center justify-center hover:bg-gray-100 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
              </button>
            </div>
          </div>

          <!-- Desktop: stacked tabs -->
          <div id="tabs-desktop" class="hidden lg:flex flex-col gap-6"></div>

        </div>

        <!-- Right — image -->
        <div class="relative order-1 lg:order-2 min-h-[260px] md:min-h-[380px]">
          <img id="feature-img" src="" alt="" class="feature-img rounded-2xl border border-gray-100 shadow-lg w-full h-full object-cover" />
        </div>

      </div>
    </div>
  </section>

  <script>
    const ICONS = {
      dashboard: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>`,
      insight:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1h-15V5h15v14.1zm0-16.1h-15c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>`,
      payments:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>`,
      mobile:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>`,
    };

    const FEATURES = [
      {
        icon: 'dashboard',
        title: "Full control from day one",
        desc: "businessONLINE is configured around how your business operates — with role-based dashboards, real-time cash visibility, and customisable approval workflows ready from the moment you log in.",
        image: "assets/feature-1.jpg",
      },
      {
        icon: 'insight',
        title: "Insight when it matters",
        desc: "Access real-time account data and cash flow analytics across every entity. Build, download, and share interactive reports — so your finance team always has a clear picture of where you stand.",
        image: "assets/feature-2.jpg",
      },
      {
        icon: 'payments',
        title: "Every payment, handled",
        desc: "Process domestic, international, bulk, and regulatory payments from a single hub. Full multi-currency support, real-time status tracking, and QuickPay for repeat transactions.",
        image: "assets/feature-3.jpg",
      },
      {
        icon: 'mobile',
        title: "Banking on the move",
        desc: "Approve transactions, monitor balances, and access the full platform from any device. businessONLINE X gives you complete control from your phone — securely, wherever you are.",
        image: "assets/feature-4.jpg",
      },
    ];

    let active = 0;
    let timer;
    let direction = 'next'; // track direction for animation

    function mobileCardHTML(f, dir) {
      const animClass = dir === 'prev' ? 'card-enter-prev' : 'card-enter';
      return `
        <div class="w-full ${animClass}">
          <div class="flex flex-col gap-3 p-5 rounded-xl bg-white shadow-xl border border-gray-200 h-[200px] overflow-hidden">
            <div class="flex items-center gap-3">
              <div class="p-2.5 rounded-full bg-[#072447] text-white flex-shrink-0">
                ${ICONS[f.icon]}
              </div>
              <h3 class="text-base font-normal text-gray-900">${f.title}</h3>
            </div>
            <p class="text-[14px] lg:text-[16px] leading-[150%] text-gray-600 flex-1 overflow-hidden">${f.desc}</p>
            <div class="bg-gray-100 rounded-sm h-1 overflow-hidden">
              <div class="h-full bg-gradient-to-r from-[#072447] to-[#2765FF] rounded-sm progress-bar"></div>
            </div>
          </div>
        </div>
      `;
    }

    function desktopCardHTML(f, i) {
      const isActive = i === active;
      return `
        <div onclick="selectTab(${i})" class="cursor-pointer w-full">
          <div class="flex lg:flex-row flex-col items-start gap-4 p-5 rounded-xl transition-all duration-300
            ${isActive ? 'bg-white shadow-xl border border-gray-200' : 'bg-gray-50/60 hover:bg-gray-100/60'}">
            <div class="flex p-2.5 rounded-full flex-shrink-0 transition-all duration-300
              ${isActive ? 'bg-[#072447] text-white' : 'bg-[#072447]/10 text-[#072447]'}">
              ${ICONS[f.icon]}
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-normal mb-4 transition-colors duration-300
                ${isActive ? 'text-gray-900' : 'text-gray-500'}">${f.title}</h3>
              <p class="text-[14px] lg:text-[16px] leading-[150%] transition-colors duration-300
                ${isActive ? 'text-gray-600' : 'text-gray-400'}">${f.desc}</p>
              <div class="mt-4 bg-gray-100 rounded-sm h-1 overflow-hidden">
                ${isActive ? `<div class="h-full bg-gradient-to-r from-[#072447] to-[#2765FF] rounded-sm progress-bar"></div>` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTabs() {
      const f = FEATURES[active];

      // Mobile: single card with animation
      document.getElementById('mobile-card').innerHTML = mobileCardHTML(f, direction);

      // Mobile: counter
      document.getElementById('mob-counter').textContent = `${active + 1} / ${FEATURES.length}`;

      // Desktop: full list
      document.getElementById('tabs-desktop').innerHTML = FEATURES.map((feat, i) => desktopCardHTML(feat, i)).join('');
    }

    function selectTab(idx, dir) {
      clearInterval(timer);
      direction = dir || (idx > active ? 'next' : 'prev');
      active = idx;

      // Update image
      const img = document.getElementById('feature-img');
      img.classList.add('fade');
      setTimeout(() => {
        img.src = FEATURES[idx].image;
        img.alt = FEATURES[idx].title;
        img.classList.remove('fade');
      }, 400);

      renderTabs();

      timer = setInterval(() => {
        const next = (active + 1) % FEATURES.length;
        selectTab(next, 'next');
      }, 4000);
    }

    function scrollPrev() {
      selectTab((active - 1 + FEATURES.length) % FEATURES.length, 'prev');
    }

    function scrollNext() {
      selectTab((active + 1) % FEATURES.length, 'next');
    }

    selectTab(0, 'next');
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>

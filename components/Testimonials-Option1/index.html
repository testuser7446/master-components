<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials — Editorial | Emirates NBD</title>
  <script src="../../assets/js/tailwind.cdn.js"></script>
  <link rel="stylesheet" href="../../assets/css/fonts.css" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── Quote + author fade + slide transition ──────────────────────── */
    #quote-text, #author-block {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #quote-text.out  { opacity: 0; transform: translateX(16px); }
    #author-block.out { opacity: 0; }
    #author-block { transition: opacity 0.3s ease 0.1s; }

    /* ── Avatar image: grayscale default, color on hover ─────────────── */
    .avatar-img {
      transition: filter 0.5s ease;
      filter: grayscale(100%);
    }
    .avatar-group:hover .avatar-img { filter: grayscale(0%); }
    .avatar-group:hover .avatar-ring { --tw-ring-opacity: 0.3; }

    /* ── Nav dot pill ────────────────────────────────────────────────── */
    .dot {
      border-radius: 9999px;
      transition: width 0.4s cubic-bezier(0.16,1,0.3,1),
                  background-color 0.3s ease;
      cursor: pointer;
      border: none;
    }
    .dot.active   { width: 24px; height: 8px; background: #072447; }
    .dot.inactive { width: 8px;  height: 8px; background: rgba(7,36,71,0.25); }
    .dot.inactive:hover { background: rgba(7,36,71,0.50); }
  </style>
</head>
<body class="bg-white min-h-screen pt-10">

  <!-- Back Nav -->
  <div class="fixed top-0 left-0 right-0 z-50 h-10 bg-white/90 backdrop-blur-sm border-b border-gray-200 flex items-center px-6">
    <a href="../../index.html" class="text-xs text-[#3A4B5C]/60 hover:text-[#072447] transition-colors flex items-center gap-2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-[#3A4B5C]/30 text-xs ml-3">/ Testimonials — Editorial</span>
  </div>

  <div class="py-12 px-8 text-center text-sm text-[#3A4B5C]/40 select-none">↑ Page content above</div>

  <!-- ── Section ────────────────────────────────────────────────────── -->
  <section class="bg-white w-full px-8 md:px-16 py-4 md:py-6">
    <div class="max-w-2xl mx-auto">

      <!-- Large index + quote -->
      <div class="flex flex-col md:flex-row items-start gap-2 md:gap-8">

        <!-- Large slide number -->
        <span id="slide-number"
          class="text-[64px] lg:text-[120px] font-light leading-none select-none text-[#072447] shrink-0"
          style="opacity:0.10; font-feature-settings:'tnum';">
          01
        </span>

        <!-- Quote + author -->
        <div class="flex-1 md:pt-6" style="min-height: 220px;">

          <!-- Quote text -->
          <blockquote id="quote-text"
            class="text-2xl lg:text-3xl font-light leading-[150%] text-[#072447] tracking-tight">
          </blockquote>

          <!-- Author -->
          <div id="author-block" class="mt-8 md:mt-10 avatar-group cursor-default">
            <div class="flex items-center gap-4">
              <!-- Avatar -->
              <div class="relative w-12 h-12 rounded-full overflow-hidden ring-2 ring-[#072447]/10 avatar-ring shrink-0 transition-all duration-300">
                <img id="author-img" src="" alt=""
                  class="avatar-img w-full h-full object-cover" />
              </div>
              <!-- Name / role / company -->
              <div class="min-w-0">
                <p id="author-name" class="font-medium text-[#072447]"></p>
                <p class="text-sm text-[#3A4B5C] flex flex-wrap items-center gap-x-1">
                  <span id="author-role"></span>
                  <span class="text-[#072447]/20">/</span>
                  <span id="author-company" class="transition-colors duration-300"></span>
                </p>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Navigation -->
      <div class="mt-4 md:mt-4 flex items-center justify-between">

        <!-- Left: dots pill + counter -->
        <div class="flex items-center gap-4">
          <!-- Pill container -->
          <div id="dots-pill"
            class="flex items-center gap-1.5 rounded-full px-4 h-9"
            style="background:rgba(0,0,0,0.08);
                   backdrop-filter:blur(24px);
                   -webkit-backdrop-filter:blur(24px);
                   box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,0.08);">
          </div>
          <!-- Counter -->
          <span id="counter" class="text-xs text-[#3A4B5C] tracking-widest uppercase"></span>
        </div>

        <!-- Right: prev / next buttons -->
        <div class="flex items-center gap-2">
          <button id="prev-btn"
            class="w-9 h-9 rounded-full bg-[#2765FF] flex items-center justify-center text-white hover:bg-[#1a54e8] transition-colors duration-200">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
          </button>
          <button id="next-btn"
            class="w-9 h-9 rounded-full bg-[#2765FF] flex items-center justify-center text-white hover:bg-[#1a54e8] transition-colors duration-200">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
          </button>
        </div>

      </div>

    </div>
  </section>

  <div class="py-12 px-8 text-center text-sm text-[#3A4B5C]/40 select-none">↓ Page content below</div>

  <script>
    const TESTIMONIALS = [
      {
        quote:   "The attention to detail and creative vision transformed our brand identity completely.",
        author:  "Sarah Chen",
        role:    "Creative Director",
        company: "Studio Forma",
        image:   "https://plus.unsplash.com/premium_photo-1689551671548-79ff30459d2a?w=900&auto=format&fit=crop&q=60",
      },
      {
        quote:   "Working with them felt like a true creative partnership from day one.",
        author:  "Marcus Webb",
        role:    "Head of Design",
        company: "Minimal Co",
        image:   "https://images.unsplash.com/photo-1649123245135-4db6ead931b5?w=900&auto=format&fit=crop&q=60",
      },
      {
        quote:   "They understand that great design is invisible yet unforgettable.",
        author:  "Elena Voss",
        role:    "Art Director",
        company: "Pixel & Co",
        image:   "https://images.unsplash.com/photo-1701615004837-40d8573b6652?w=900&auto=format&fit=crop&q=60",
      },
    ];

    const N = TESTIMONIALS.length;
    let active = 0;
    let transitioning = false;

    const elNumber   = document.getElementById('slide-number');
    const elQuote    = document.getElementById('quote-text');
    const elAuthor   = document.getElementById('author-block');
    const elImg      = document.getElementById('author-img');
    const elName     = document.getElementById('author-name');
    const elRole     = document.getElementById('author-role');
    const elCompany  = document.getElementById('author-company');
    const elPill     = document.getElementById('dots-pill');
    const elCounter  = document.getElementById('counter');
    const prevBtn    = document.getElementById('prev-btn');
    const nextBtn    = document.getElementById('next-btn');

    function pad(n) { return String(n).padStart(2, '0'); }

    function buildDots() {
      elPill.innerHTML = '';
      TESTIMONIALS.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'dot ' + (i === active ? 'active' : 'inactive');
        btn.onclick = () => handleChange(i);
        elPill.appendChild(btn);
      });
    }

    function renderContent() {
      const t = TESTIMONIALS[active];
      elNumber.textContent   = pad(active + 1);
      elQuote.textContent    = t.quote;
      elImg.src              = t.image;
      elImg.alt              = t.author;
      elName.textContent     = t.author;
      elRole.textContent     = t.role;
      elCompany.textContent  = t.company;
      elCounter.textContent  = pad(active + 1) + ' / ' + pad(N);
      buildDots();
    }

    function handleChange(index) {
      if (index === active || transitioning) return;
      transitioning = true;

      // Fade out
      elQuote.classList.add('out');
      elAuthor.classList.add('out');

      setTimeout(() => {
        active = index;
        renderContent();

        // Fade in
        elQuote.classList.remove('out');
        elAuthor.classList.remove('out');

        setTimeout(() => { transitioning = false; }, 50);
      }, 300);
    }

    prevBtn.addEventListener('click', () =>
      handleChange(active === 0 ? N - 1 : active - 1));
    nextBtn.addEventListener('click', () =>
      handleChange(active === N - 1 ? 0 : active + 1));

    // Initial render
    renderContent();
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Content — Featured + Carousel | Emirates NBD</title>
  <script src="../../assets/js/tailwind.cdn.js"></script>
  <link rel="stylesheet" href="../../assets/css/fonts.css" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── Text fade transitions ───────────────────────────────────────── */
    .fade-text {
      transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1),
                  transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .fade-text.out { opacity: 0; transform: translateY(-10px); }
    .fade-text.in  { opacity: 0; transform: translateY(14px); }
    .fade-text.visible { opacity: 1; transform: translateY(0); }

    /* ── Image crossfade ─────────────────────────────────────────────── */
    .slide-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity 1s cubic-bezier(0.16,1,0.3,1);
      opacity: 0;
    }
    .slide-img.active { opacity: 1; }

    /* ── Deal cards stack — fixed positions, never move ─────────────── */
    .deal-card {
      position: absolute; left: 0; right: 0; margin: 0 20px;
      display: flex; align-items: center; gap: 12px;
      background: white; border-radius: 16px;
      padding: 12px 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    /* ── Progress bar animation ──────────────────────────────────────── */
    @keyframes progress-fill {
      from { width: 0%; }
      to   { width: 100%; }
    }
    .progress-bar {
      position: absolute; top: 0; bottom: 0; left: 0;
      height: 100%;
      border-radius: 9999px; background: #111827;
      animation: progress-fill 4s linear forwards;
    }

    /* ── Dot grid background ─────────────────────────────────────────── */
    .dot-grid {
      background-image: radial-gradient(circle, #d1d5db 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* ── Scroll reveal ───────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                  transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.from-y { transform: translateY(32px); }
    .reveal.from-x { transform: translateX(20px); }
    .reveal.visible { opacity: 1 !important; transform: none !important; }
    .delay-1 { transition-delay: 0.15s; }
    .delay-2 { transition-delay: 0.25s; }

    /* ── Left panel: auto height on tablet, fixed on desktop ────────── */
    #left-panel { height: auto; overflow: visible; }
    @media (min-width: 1024px) {
      #left-panel { height: 580px; overflow: hidden; }
    }
  </style>
</head>
<body class="bg-[#F0F2F5] min-h-screen pt-10">

  <!-- Back Nav -->
  <div class="fixed top-0 left-0 right-0 z-50 h-10 bg-white/90 backdrop-blur-sm border-b border-gray-200 flex items-center px-6">
    <a href="../../index.html" class="text-xs text-[#3A4B5C]/60 hover:text-[#072447] transition-colors flex items-center gap-2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-[#3A4B5C]/30 text-xs ml-3">/ Video Content — Featured + Carousel</span>
  </div>

  <div class="py-12 px-8 text-center text-sm text-[#3A4B5C]/40 select-none">↑ Page content above</div>

  <!-- ── Section ────────────────────────────────────────────────────── -->
  <section class="bg-[#F0F2F5] w-full px-4 md:px-[120px] py-4 md:py-6 overflow-hidden">
    <div id="main-grid"
         class="max-w-[1200px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start">

      <!-- ── LEFT — text panel ───────────────────────────────────────── -->
      <div id="left-panel" class="reveal from-y flex flex-col gap-8 lg:justify-between pt-8 pb-6 md:col-span-2 lg:col-span-1">

        <div class="flex flex-col gap-5">
          <!-- Heading -->
          <h2 id="slide-heading"
              class="fade-text visible text-[22px] lg:text-[26px] font-normal text-[#111827] leading-[140%] tracking-tight">
          </h2>

          <!-- Body -->
          <p id="slide-body"
             class="fade-text visible text-[14px] text-[#6B7280] leading-relaxed max-w-[300px]">
          </p>

          <!-- Progress pill -->
          <div class="inline-flex items-center gap-2 self-start px-4 py-2.5 rounded-full bg-white border border-[#E5E7EB] shadow-sm">
            <div class="relative w-12 h-1.5 rounded-full bg-[#E5E7EB] overflow-hidden">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="dot-nav" class="flex items-center gap-2"></div>
          </div>
        </div>

        <!-- Big stat -->
        <div>
          <p id="slide-stat"
             class="fade-text visible text-[60px] lg:text-[72px] font-bold text-[#111827] leading-none tracking-tight">
          </p>
          <p id="slide-stat-label" class="text-[13px] text-[#9CA3AF] mt-2"></p>
        </div>
      </div>

      <!-- ── CENTRE — image card ─────────────────────────────────────── -->
      <div class="reveal from-y delay-1 relative rounded-[28px] overflow-hidden shadow-2xl" style="height: 580px;">

        <!-- Crossfading images -->
        <div id="images-container" class="absolute inset-0"></div>

        <!-- Gradient overlay -->
        <div class="absolute inset-0 z-[1]"
             style="background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.7) 100%);">
        </div>

        <!-- Stacked deal cards -->
        <div id="deal-cards" class="absolute z-10" style="top: 24px; left: 0; right: 0; height: 200px;"></div>

        <!-- Bottom stat tiles -->
        <div class="absolute bottom-0 left-0 right-0 z-10 px-5 pb-6 flex flex-col items-center gap-2">
          <div class="flex gap-3">
            <div class="flex items-center justify-center rounded-[18px] bg-white/20 backdrop-blur-md border border-white/20 shadow-lg"
                 style="width:72px; height:72px;">
              <span class="text-[24px] font-bold text-white">76</span>
            </div>
            <div class="flex items-center justify-center rounded-[18px] bg-white/20 backdrop-blur-md border border-white/20 shadow-lg"
                 style="width:72px; height:72px;">
              <span class="text-[24px] font-bold text-white">37×</span>
            </div>
          </div>
          <p class="text-[12px] text-white/70 font-medium">Deals priced · Avg. oversubscription</p>
        </div>
      </div>

      <!-- ── RIGHT — testimonial card ───────────────────────────────── -->
      <div class="reveal from-x delay-2 dot-grid rounded-[28px] bg-white border border-[#E5E7EB] p-8 flex flex-col justify-between shadow-sm overflow-hidden"
           style="height: 580px;">

        <!-- Logo -->
        <div>
          <div class="flex items-center gap-2 mb-8">
            <div class="w-5 h-5 bg-[#111827] rounded-[4px]"></div>
            <span class="text-[15px] font-bold text-[#111827]">Emirates NBD Capital</span>
          </div>

          <!-- Quote -->
          <p id="slide-quote"
             class="fade-text visible text-[19px] lg:text-[21px] font-bold text-[#111827] leading-[148%] tracking-tight">
          </p>
        </div>

        <!-- Attribution -->
        <div id="slide-attr"
             class="fade-text visible mt-4 pt-6 border-t border-[#E5E7EB] flex items-start gap-3">
          <div class="w-px shrink-0 bg-[#111827]" style="height: 36px;"></div>
          <div>
            <div class="flex items-center gap-3 flex-wrap">
              <span id="slide-author" class="text-[13px] font-semibold text-[#111827]"></span>
              <span id="slide-title"  class="text-[13px] text-[#6B7280]"></span>
            </div>
            <span id="slide-company" class="text-[11px] text-[#9CA3AF] mt-1 block"></span>
          </div>
        </div>

      </div>
    </div>
  </section>

  <div class="py-12 px-8 text-center text-sm text-[#3A4B5C]/40 select-none">↓ Page content below</div>

  <script>
    // ── Resolve asset base path (handles server stripping index.html) ─
    const _p = window.location.pathname;
    const _lastSeg = _p.split('/').pop();
    const _isDir = !_lastSeg.includes('.');   // no extension → it's a directory
    const ASSET_BASE = (_p.replace(/\/?$/, '/')) && (_isDir
      ? _p.replace(/\/?$/, '/') + 'assets/'
      : _p.substring(0, _p.lastIndexOf('/') + 1) + 'assets/');

    // ── Data ──────────────────────────────────────────────────────────
    const SLIDES = [
      {
        heading:   "The region's most trusted capital markets partner",
        body:      "Access to the deepest pools of regional and international capital — with a track record across sovereign, corporate and FI mandates.",
        stat:      "USD 95bn+",
        statLabel: "Capital advised & arranged",
        image:     "slide-1.jpg",
        deal:      { initials: "DE", name: "DEWA IPO",     role: "Joint Global Coordinator", rating: "4.9", badge: "+4" },
        quote:     "EmCap brought unmatched depth of regional knowledge and global execution to our mandate.",
        author:    "Ahmed Al Rashidi",
        title:     "CFO, DEWA",
        company:   "Dubai Electricity & Water Authority",
      },
      {
        heading:   "Landmark deals across every asset class",
        body:      "From the region's largest-ever IPO to complex multi-tranche loan syndications — we bring execution certainty to the most demanding mandates.",
        stat:      "76",
        statLabel: "DCM issuances priced",
        image:     "slide-2.jpg",
        deal:      { initials: "SA", name: "Saudi Aramco", role: "Joint Lead Manager",        rating: "4.8", badge: "+7" },
        quote:     "From origination to distribution — they executed flawlessly in one of the most competitive markets globally.",
        author:    "Ziad Al Murshed",
        title:     "CFO, Saudi Aramco",
        company:   "Saudi Arabian Oil Company",
      },
      {
        heading:   "On-ground across 13 markets worldwide",
        body:      "Dedicated teams in Dubai, London, Singapore and beyond — delivering local insight backed by a truly global distribution network.",
        stat:      "13",
        statLabel: "Active markets",
        image:     "slide-3.jpg",
        deal:      { initials: "DP", name: "DP World",     role: "Mandated Lead Arranger",    rating: "4.7", badge: "+6" },
        quote:     "The team's ability to coordinate across markets and bring the right investors to the table was exceptional.",
        author:    "Yuvraj Narayan",
        title:     "Group CFO, DP World",
        company:   "DP World Group",
      },
      {
        heading:   "Trusted by sovereign and institutional leaders",
        body:      "From Abu Dhabi sovereign wealth to global financial institutions — advisory and capital solutions built for decisive mandates.",
        stat:      "40+",
        statLabel: "Syndicated loans closed",
        image:     "slide-4.jpg",
        deal:      { initials: "MU", name: "Mubadala",     role: "Bookrunner",                rating: "4.6", badge: "+4" },
        quote:     "A partner that truly understands both the regional landscape and the complexity of global capital markets.",
        author:    "Carlos Obeid",
        title:     "Head of Capital Markets, Mubadala",
        company:   "Mubadala Investment Company",
      },
    ];

    const INTERVAL = 4000;
    const N = SLIDES.length;
    let active = 0;
    let paused = false;

    // ── DOM refs ──────────────────────────────────────────────────────
    const elHeading   = document.getElementById('slide-heading');
    const elBody      = document.getElementById('slide-body');
    const elStat      = document.getElementById('slide-stat');
    const elStatLabel = document.getElementById('slide-stat-label');
    const elQuote     = document.getElementById('slide-quote');
    const elAttr      = document.getElementById('slide-attr');
    const elAuthor    = document.getElementById('slide-author');
    const elTitle     = document.getElementById('slide-title');
    const elCompany   = document.getElementById('slide-company');
    const elProgress  = document.getElementById('progress-bar');
    const elDotNav    = document.getElementById('dot-nav');
    const imagesEl    = document.getElementById('images-container');
    const cardsEl     = document.getElementById('deal-cards');
    const mainGrid    = document.getElementById('main-grid');

    // ── Build images ──────────────────────────────────────────────────
    SLIDES.forEach((s, i) => {
      const img = document.createElement('img');
      img.src = ASSET_BASE + s.image;
      img.alt = '';
      img.className = 'slide-img' + (i === 0 ? ' active' : '');
      img.draggable = false;
      imagesEl.appendChild(img);
    });

    // ── Deal card stack — each slide owns a card, cards animate slots ──
    //    Slot 0 = front/top · Slot 3 = back/bottom
    const SLOT = [
      { y:   0, scale: 1.00, opacity: 1.00, z: 40 },
      { y:  48, scale: 0.94, opacity: 0.80, z: 30 },
      { y:  90, scale: 0.88, opacity: 0.52, z: 20 },
      { y: 126, scale: 0.83, opacity: 0.22, z: 10 },
    ];

    function cardInnerHTML(deal) {
      return `
        <div style="width:38px;height:38px;border-radius:50%;
             background:linear-gradient(135deg,#2765FF,#0e3a8a);
             display:flex;align-items:center;justify-content:center;
             flex-shrink:0;box-shadow:0 4px 12px rgba(39,101,255,0.3);">
          <span style="font-size:11px;font-weight:700;color:white;">${deal.initials}</span>
        </div>
        <div style="flex:1;min-width:0;">
          <p style="font-size:13px;font-weight:600;color:#111827;line-height:1;margin-bottom:4px;
               white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${deal.name}</p>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:11px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${deal.role}</span>
            <span style="color:#D1D5DB;">·</span>
            <span style="font-size:11px;color:#FBBF24;">★</span>
            <span style="font-size:11px;color:#6B7280;flex-shrink:0;">${deal.rating}</span>
          </div>
        </div>
        <span style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:9999px;
             background:#111827;color:white;flex-shrink:0;">${deal.badge}</span>`;
    }

    // One card per slide — content never changes, only position animates
    SLIDES.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'deal-card';
      card.id = `card-${i}`;
      card.innerHTML = cardInnerHTML(s.deal);
      cardsEl.appendChild(card);
    });

    // Apply slot positions to all cards based on active slide
    function applySlots(activeIdx, instant) {
      SLIDES.forEach((_, i) => {
        const slot = (i - activeIdx + N) % N;
        const p    = SLOT[slot];
        const card = document.getElementById(`card-${i}`);
        card.style.transition = instant
          ? 'none'
          : 'transform 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.45s ease';
        card.style.transform = `translateY(${p.y}px) scale(${p.scale})`;
        card.style.opacity   = p.opacity;
        card.style.zIndex    = p.z;
      });
    }

    // When transitioning: instantly drop z-index of departing top card
    // so it slides BEHIND the others, then let CSS transition handle movement
    function updateCards(newActive, prevActive) {
      // Old top card → drop z so it animates to the back visually
      const oldTopCard = document.getElementById(`card-${prevActive}`);
      if (oldTopCard) oldTopCard.style.zIndex = '5';
      // Small frame gap ensures z-index applies before transition kicks in
      requestAnimationFrame(() => applySlots(newActive, false));
    }

    // ── Build dot nav ─────────────────────────────────────────────────
    SLIDES.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.id = `dot-${i}`;
      dot.style.cssText = 'border-radius:9999px;transition:all 0.3s;border:none;cursor:pointer;';
      dot.onclick = () => goTo(i);
      elDotNav.appendChild(dot);
    });

    // ── Fade helper ───────────────────────────────────────────────────
    function fadeSwap(el, newContent, delay = 0, isHTML = false) {
      el.classList.remove('visible');
      el.classList.add('out');
      setTimeout(() => {
        if (isHTML) el.innerHTML = newContent;
        else el.textContent = newContent;
        el.classList.remove('out');
        el.classList.add('in');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          el.classList.remove('in');
          el.classList.add('visible');
        }));
      }, 250 + delay);
    }

    // ── Progress bar — driven by animationend for zero-gap sync ──────
    function restartProgress() {
      elProgress.style.animation = 'none';
      void elProgress.offsetWidth;                              // force reflow
      if (!paused) elProgress.style.animation = `progress-fill ${INTERVAL}ms linear forwards`;
    }

    // Fire next slide the instant the bar finishes — no setInterval gap
    elProgress.addEventListener('animationend', () => {
      if (!paused) goTo((active + 1) % N);
    });

    // ── Update dot nav ────────────────────────────────────────────────
    function updateDots() {
      SLIDES.forEach((_, i) => {
        const dot = document.getElementById(`dot-${i}`);
        dot.style.width      = i === active ? '8px' : '6px';
        dot.style.height     = i === active ? '8px' : '6px';
        dot.style.background = i === active ? '#111827' : '#D1D5DB';
      });
    }

    // ── Go to slide ───────────────────────────────────────────────────
    function goTo(idx) {
      if (idx === active) return;
      const s = SLIDES[idx];

      // Crossfade images
      document.querySelectorAll('.slide-img').forEach((img, i) => {
        img.classList.toggle('active', i === idx);
      });

      // Fade text content
      fadeSwap(elHeading, s.heading);
      fadeSwap(elBody,    s.body,    50);
      fadeSwap(elStat,    s.stat,    0);
      elStatLabel.textContent = s.statLabel;
      fadeSwap(elQuote,   `"${s.quote}"`, 0);
      fadeSwap(elAuthor,  s.author,  80);
      fadeSwap(elTitle,   s.title,   80);
      fadeSwap(elCompany, s.company, 80);

      const prev = active;
      active = idx;
      updateDots();
      updateCards(idx, prev);
      restartProgress();
    }

    // ── Pause / resume on hover ───────────────────────────────────────
    mainGrid.addEventListener('mouseenter', () => {
      paused = true;
      elProgress.style.animationPlayState = 'paused';
    });
    mainGrid.addEventListener('mouseleave', () => {
      paused = false;
      elProgress.style.animationPlayState = 'running';
    });

    // ── Init ──────────────────────────────────────────────────────────
    function init() {
      const s = SLIDES[active];
      elHeading.textContent  = s.heading;
      elBody.textContent     = s.body;
      elStat.textContent     = s.stat;
      elStatLabel.textContent = s.statLabel;
      elQuote.textContent    = `"${s.quote}"`;
      elAuthor.textContent   = s.author;
      elTitle.textContent    = s.title;
      elCompany.textContent  = s.company;
      updateDots();
      applySlots(active, true);   // instant on first render — no animation
      restartProgress();          // starts progress bar; animationend drives the cycle
    }

    init();

    // ── Scroll reveal ─────────────────────────────────────────────────
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.1, rootMargin: '0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>

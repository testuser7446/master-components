  <script type="module">
    import createGlobe from '../../assets/js/cobe.js';

    // ── GLOBE_CONFIG — exact copy from provided React code ────────────
    const GLOBE_CONFIG = {
      width:           800,
      height:          800,
      onRender:        () => {},
      devicePixelRatio: 2,
      phi:             0,
      theta:           0.3,
      dark:            0,
      diffuse:         0.4,
      mapSamples:      16000,
      mapBrightness:   1.2,
      baseColor:       [1, 1, 1],
      markerColor:     [251 / 255, 100 / 255, 21 / 255],
      glowColor:       [1, 1, 1],
      markers: [
        { location: [ 14.5995,  120.9842], size: 0.03 },
        { location: [ 19.0760,   72.8777], size: 0.10 },
        { location: [ 23.8103,   90.4125], size: 0.05 },
        { location: [ 30.0444,   31.2357], size: 0.07 },
        { location: [ 39.9042,  116.4074], size: 0.08 },
        { location: [-23.5505,  -46.6333], size: 0.10 },
        { location: [ 19.4326,  -99.1332], size: 0.10 },
        { location: [ 40.7128,  -74.0060], size: 0.10 },
        { location: [ 34.6937,  135.5022], size: 0.05 },
        { location: [ 41.0082,   28.9784], size: 0.06 },
      ],
    };

    // ── Globe init — mirrors React Globe component exactly ────────────
    let phi = 0;
    let width = 0;
    const canvas = document.getElementById('globe-canvas');
    let pointerInteracting = null;
    let pointerInteractionMovement = 0;
    let r = 0;

    function updatePointerInteraction(value) {
      pointerInteracting = value;
      canvas.style.cursor = value !== null ? 'grabbing' : 'grab';
    }

    function updateMovement(clientX) {
      if (pointerInteracting !== null) {
        const delta = clientX - pointerInteracting;
        pointerInteractionMovement = delta;
        r = delta / 200;
      }
    }

    function onRender(state) {
      if (pointerInteracting === null) phi += 0.005;
      state.phi    = phi + r;
      state.width  = width * 2;
      state.height = width * 2;
    }

    function onResize() {
      if (canvas) width = canvas.offsetWidth;
    }
    window.addEventListener('resize', onResize);
    onResize();

    const globe = createGlobe(canvas, {
      ...GLOBE_CONFIG,
      width:    width * 2,
      height:   width * 2,
      onRender,
    });

    // Fade in once ready (matches React setTimeout(() => opacity = "1"))
    setTimeout(() => { canvas.style.opacity = '1'; });

    // ── Pointer events — mirrors React canvas event handlers ──────────
    canvas.addEventListener('pointerdown', (e) => {
      updatePointerInteraction(e.clientX - pointerInteractionMovement);
    });
    canvas.addEventListener('pointerup',  () => updatePointerInteraction(null));
    canvas.addEventListener('pointerout', () => updatePointerInteraction(null));
    canvas.addEventListener('mousemove',  (e) => updateMovement(e.clientX));
    canvas.addEventListener('touchmove',  (e) => {
      if (e.touches[0]) updateMovement(e.touches[0].clientX);
    });
  </script>

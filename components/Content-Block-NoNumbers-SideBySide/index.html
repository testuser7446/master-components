<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Block — No Numbers (Side by Side) | Emirates NBD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── Scroll-reveal ───────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                  transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.from-y    { transform: translateY(28px); }
    .reveal.from-y-sm { transform: translateY(20px); }

    .reveal.visible { opacity: 1 !important; transform: none !important; }

    .delay-1 { transition-delay: 0.10s; }
  </style>
</head>
<body class="bg-[#F4F7FB] min-h-screen pt-10">

  <!-- Back Nav -->
  <div class="fixed top-0 left-0 right-0 z-50 h-10 bg-white/90 backdrop-blur-sm border-b border-gray-200 flex items-center px-6">
    <a href="../../index.html" class="text-xs text-[#3A4B5C]/60 hover:text-[#072447] transition-colors flex items-center gap-2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-[#3A4B5C]/30 text-xs ml-3">/ Content Block — No Numbers (Side by Side)</span>
  </div>

  <!-- ── Side-by-side layout, subheading1 heading size ─────────────── -->
  <section class="bg-[#F4F7FB] w-full px-4 md:px-[120px] py-4 md:py-6">
    <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row md:gap-16 items-start">

      <h2 class="reveal from-y text-[24px] lg:text-[36px] font-normal text-[#072447] leading-[150%] tracking-tight md:w-1/2 flex-shrink-0">
        Mobile, secure, and<br />always on
      </h2>

      <p class="reveal from-y-sm delay-1 text-[14px] lg:text-[16px] font-normal text-[#3A4B5C] leading-[150%] md:w-1/2 md:pt-3">
        Stay in control wherever you are with the businessONLINE mobile app. Approve transactions, monitor cash positions, and access instant services from your phone, safely and effortlessly.
      </p>

    </div>
  </section>

  <script>
    // ── IntersectionObserver scroll reveal ────────────────────────────
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel — Autoplay with Progress (Center) | Emirates NBD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, body { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── Carousel core ───────────────────────────────────────────── */
    #embla { overflow: hidden; position: relative; }

    #embla-container {
      display: flex;
      will-change: transform;
      transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1);
      user-select: none;
      cursor: grab;
    }
    #embla-container.dragging  { cursor: grabbing; transition: none; }
    #embla-container.no-trans  { transition: none; }

    .embla__slide {
      flex-shrink: 0;
      width: 72%;
      padding: 0 6px;
      box-sizing: border-box;
    }
    @media (max-width: 767px) {
      .embla__slide { width: 88%; }
    }

    /* ── Slide card ─────────────────────────────────────────────── */
    .slide-card {
      position: relative;
      height: 504px;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                  opacity  0.45s ease,
                  filter   0.45s ease;
    }
    .slide-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none;
    }
    .slide-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(7,36,71,0.82) 0%, transparent 60%);
    }
    .slide-meta {
      position: absolute; bottom: 24px; left: 24px;
    }
    .slide-tag {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: #ffffff;
      background: #2765FF;
      padding: 4px 12px; border-radius: 9999px;
      margin-bottom: 8px;
    }
    .slide-title {
      color: #fff;
      font-size: 22px; font-weight: 700;
      line-height: 1.3;
    }

    /* dim + greyscale non-active slides */
    .embla__slide:not(.active) .slide-card {
      opacity: 0.55;
      transform: scale(0.97);
      filter: grayscale(1);
    }
    .embla__slide.active .slide-card {
      opacity: 1;
      transform: scale(1);
      filter: grayscale(0);
    }

    /* ── Edge gradients ─────────────────────────────────────────── */
    .edge-grad {
      position: absolute; top: 0; bottom: 0;
      width: 14%;
      z-index: 10;
      pointer-events: none;
    }
    .edge-grad-left  { left:  0; background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%); }
    .edge-grad-right { right: 0; background: linear-gradient(to left,  rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%); }

    /* ── Apple pill ─────────────────────────────────────────────── */
    .dot {
      width: 8px; height: 8px;
      border-radius: 9999px;
      background: rgba(7,36,71,0.25);
      border: none; cursor: pointer;
      transition: width 0.35s ease, background 0.35s ease;
      flex-shrink: 0;
    }
    .dot.active { width: 24px; background: #072447; }
    .pill-shadow {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body class="bg-white min-h-screen pt-10">

  <!-- Back Nav -->
  <div class="fixed top-0 left-0 right-0 z-50 h-10 bg-white/90 backdrop-blur-sm border-b border-gray-200 flex items-center px-6">
    <a href="../../index.html" class="text-xs text-[#3A4B5C]/60 hover:text-[#072447] transition-colors flex items-center gap-2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Component Library
    </a>
    <span class="text-[#3A4B5C]/30 text-xs ml-3">/ Carousel — Autoplay with Progress (Center)</span>
  </div>

  <div class="py-12 px-8 text-center text-sm text-[#3A4B5C]/40 select-none">↑ Page content above</div>

  <section class="w-full bg-white py-4 md:py-6">

    <!-- Center-aligned header -->
    <div class="max-w-3xl mx-auto px-6 mb-10 text-center">
      <span class="text-[#2765FF] text-xs font-semibold uppercase tracking-widest block mb-4">Emirates NBD</span>
      <h2 class="text-[24px] lg:text-[36px] font-normal text-[#072447] tracking-tight mb-4">
        Everything You Need,<br />All in One Place
      </h2>
      <p class="text-[#3A4B5C] text-[14px] lg:text-[16px] font-light leading-[150%]">
        From everyday banking to complex corporate finance — discover the full range
        of Emirates NBD solutions designed to keep you ahead.
      </p>
    </div>

    <!-- Carousel -->
    <div id="embla">
      <div class="edge-grad edge-grad-left"></div>
      <div class="edge-grad edge-grad-right"></div>
      <div id="embla-container"></div>
    </div>

    <!-- Apple-style controls -->
    <div class="flex items-center justify-center gap-3 mt-4">
      <div id="dot-pill"
           class="pill-shadow flex items-center gap-1.5 rounded-full px-4 h-9"
           style="background:rgba(0,0,0,0.08); backdrop-filter:blur(24px);">
      </div>
      <button id="pp-btn" type="button"
              class="flex items-center justify-center w-9 h-9 rounded-full pill-shadow transition-all active:scale-95"
              style="background:rgba(0,0,0,0.08); backdrop-filter:blur(24px); color:#072447;">
      </button>
    </div>

  </section>

  <div class="py-12 px-8 text-center text-sm text-[#3A4B5C]/40 select-none">↓ Page content below</div>

  <script>
    /* ── Slide data ──────────────────────────────────────────────── */
    const SLIDES = [
      { img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=900&q=80&auto=format&fit=crop', tag: 'Business',  title: 'Corporate Banking'  },
      { img: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=900&q=80&auto=format&fit=crop', tag: 'Digital',   title: 'Mobile Banking'     },
      { img: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=900&q=80&auto=format&fit=crop', tag: 'Priority',  title: 'Wealth Management'  },
      { img: 'https://images.unsplash.com/photo-1578575437130-527eed3abbec?w=900&q=80&auto=format&fit=crop', tag: 'Global',    title: 'Trade Finance'      },
      { img: 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=900&q=80&auto=format&fit=crop', tag: 'Retail',    title: 'Instant Payments'   },
    ];
    const N = SLIDES.length;

    function makeSlideHTML(s) {
      return `
        <div class="slide-card">
          <img src="${s.img}" alt="${s.title}" draggable="false" />
          <div class="slide-overlay"></div>
          <div class="slide-meta">
            <span class="slide-tag">${s.tag}</span>
            <h3 class="slide-title">${s.title}</h3>
          </div>
        </div>`;
    }

    /* Clone layout: [clone_last, slide_0..slide_N-1, clone_first] */
    const container = document.getElementById('embla-container');

    const cloneLast = document.createElement('div');
    cloneLast.className = 'embla__slide';
    cloneLast.innerHTML = makeSlideHTML(SLIDES[N - 1]);
    container.appendChild(cloneLast);

    SLIDES.forEach(s => {
      const el = document.createElement('div');
      el.className = 'embla__slide';
      el.innerHTML = makeSlideHTML(s);
      container.appendChild(el);
    });

    const cloneFirst = document.createElement('div');
    cloneFirst.className = 'embla__slide';
    cloneFirst.innerHTML = makeSlideHTML(SLIDES[0]);
    container.appendChild(cloneFirst);

    const allSlides = container.querySelectorAll('.embla__slide');
    const embla = document.getElementById('embla');

    /* ── Sizing ──────────────────────────────────────────────────── */
    function slideW()      { return allSlides[1].offsetWidth; }
    function centerOffset(){ return (embla.offsetWidth - slideW()) / 2; }
    function translateFor(idx){ return centerOffset() - idx * slideW(); }

    /* ── State ───────────────────────────────────────────────────── */
    let curIdx = 1, curReal = 0;

    function updateActive() {
      allSlides.forEach((el, i) => el.classList.toggle('active', i === curIdx));
    }

    /* ── Dots ────────────────────────────────────────────────────── */
    const pill = document.getElementById('dot-pill');
    const dots = [];
    SLIDES.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', `Slide ${i + 1}`);
      d.addEventListener('click', () => { goToReal(i); resetTimer(); });
      pill.appendChild(d);
      dots.push(d);
    });

    function updateDots() {
      dots.forEach((d, i) => d.classList.toggle('active', i === curReal));
    }

    /* ── Play / Pause ────────────────────────────────────────────── */
    const PAUSE_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
    const PLAY_SVG  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const ppBtn = document.getElementById('pp-btn');
    let playing = true, timer = null;

    function updatePP() { ppBtn.innerHTML = playing ? PAUSE_SVG : PLAY_SVG; }
    ppBtn.addEventListener('click', () => { playing = !playing; updatePP(); resetTimer(); });

    /* ── Navigation ──────────────────────────────────────────────── */
    const ANIM_MS = 450;

    function snapInstant(idx) {
      container.classList.add('no-trans');
      void container.offsetWidth;
      container.style.transform = `translateX(${translateFor(idx)}px)`;
      curIdx = idx;
      curReal = ((curIdx - 1) % N + N) % N;
      updateActive();
      updateDots();
      requestAnimationFrame(() => container.classList.remove('no-trans'));
    }

    function moveTo(idx, instant) {
      if (instant) { snapInstant(idx); return; }
      container.classList.remove('no-trans');
      container.style.transform = `translateX(${translateFor(idx)}px)`;
      curIdx = idx;
      curReal = ((curIdx - 1) % N + N) % N;
      updateActive();
      updateDots();
      setTimeout(() => {
        if (curIdx === 0)     snapInstant(N);
        if (curIdx === N + 1) snapInstant(1);
      }, ANIM_MS);
    }

    function goToReal(realIdx) { moveTo(realIdx + 1, false); }
    function next() { moveTo(curIdx + 1, false); }
    function prev() { moveTo(curIdx - 1, false); }

    /* ── Autoplay ────────────────────────────────────────────────── */
    function startTimer() {
      clearInterval(timer);
      if (playing) timer = setInterval(next, 3000);
    }
    function resetTimer() { startTimer(); }

    /* ── Drag — mouse ────────────────────────────────────────────── */
    let dragStartX = 0, dragBaseTranslate = 0, isDragging = false;

    container.addEventListener('mousedown', e => {
      isDragging = true;
      dragStartX = e.clientX;
      dragBaseTranslate = translateFor(curIdx);
      container.classList.add('dragging');
      clearInterval(timer);
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      container.classList.add('no-trans');
      container.style.transform = `translateX(${dragBaseTranslate + (e.clientX - dragStartX)}px)`;
    });
    window.addEventListener('mouseup', e => {
      if (!isDragging) return;
      isDragging = false;
      container.classList.remove('dragging', 'no-trans');
      const delta = e.clientX - dragStartX;
      if (Math.abs(delta) > 60) moveTo(curIdx + (delta < 0 ? 1 : -1), false);
      else moveTo(curIdx, false);
      resetTimer();
    });

    /* ── Drag — touch ────────────────────────────────────────────── */
    container.addEventListener('touchstart', e => {
      dragStartX = e.touches[0].clientX;
      dragBaseTranslate = translateFor(curIdx);
      clearInterval(timer);
    }, { passive: true });
    container.addEventListener('touchmove', e => {
      container.classList.add('no-trans');
      container.style.transform = `translateX(${dragBaseTranslate + (e.touches[0].clientX - dragStartX)}px)`;
    }, { passive: true });
    container.addEventListener('touchend', e => {
      container.classList.remove('no-trans');
      const delta = e.changedTouches[0].clientX - dragStartX;
      if (Math.abs(delta) > 60) moveTo(curIdx + (delta < 0 ? 1 : -1), false);
      else moveTo(curIdx, false);
      resetTimer();
    });

    /* ── Resize ──────────────────────────────────────────────────── */
    window.addEventListener('resize', () => moveTo(curIdx, true));

    /* ── Init ────────────────────────────────────────────────────── */
    moveTo(1, true);
    updatePP();
    startTimer();
  </script>
  <script src="../../assets/js/copy-bridge.js"></script>
</body>
</html>
